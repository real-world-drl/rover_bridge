# Bridge configuration for rover_bridge.
#
# Usage:
#   python -m rover_bridge                       # auto-loads this file
#   python -m rover_bridge --config /path/to.yaml
#   python -m rover_bridge --broker mqtt-h --transport mqtt   # CLI overrides
#   python -m rover_bridge --config ''           # skip YAML, defaults + CLI only
#
# Precedence: CLI > YAML > built-in default.

# --- Rover link (selectable) ----------------------------------------------
# How cmd_vel reaches the rover and how telemetry comes back. The inference
# side (camera out, gemnav/act + gemnav/ctrl in) is always MQTT regardless.
transport: uart            # uart | mqtt

# UART link (transport: uart). On a Pi 5, /dev/ttyAMA0 is shared with the BT
# HCI by default — disable BT (use ttyAMA0) or enable a 2nd UART (use ttyAMA1).
uart_port: /dev/ttyAMA0
uart_baud: 921600

# --- MQTT broker -----------------------------------------------------------
# Used by the inference side always, and by the rover link when transport: mqtt.
broker: darkhorse
port: 1883
# Robot id; substituted into ugv/<id>/v1/... topics. Only used when transport: mqtt.
robot_id: ugv01

# --- Inference topics (same model / topics as the Spot setup) --------------
action_topic: gemnav/act     # inference trajectories in
ctrl_topic: gemnav/ctrl      # {"stop": true} / {"start": true}
# Manual remote teleop, e.g. {"linear": 0.3, "angular": 0.14}. These commands
# move the rover even while the bridge is halted (waiting for a {"start": true})
# — they bypass the inference halt state.
remote_topic: gemnav/remote
camera_topic: r2/realsense       # bridge publishes frames here; the model subscribes

# --- Pose source -----------------------------------------------------------
# What feeds the waypoint follower:
#   wheel : integrate the rover's encoders (default); the bridge publishes that
#           pose to pose_topic below.
#   vio   : consume rover_vio's pose off MQTT (vio_pose_topic) and feed it to the
#           follower instead. rover_vio owns the pose topic, so the bridge does
#           NOT publish wheel pose in this mode. Both frames are REP-103
#           (x-forward, y-left), so the follower gets compatible poses either way.
pose_source: wheel
vio_pose_topic: r2/slam/odom/tip/pose    # pose_source=vio: rover_vio publishes its VIO pose here

# --- Pose streaming (wheel source) -----------------------------------------
# Wheel-odometry pose, published to MQTT as PoseStamped-shaped JSON (same
# format ros_ws forwards its SLAM pose in): {header, pose:{position, orientation}}.
publish_pose: true
pose_topic: r2/slam/odom/tip/pose        # MQTT topic the pose is published on
pose_rate_limit: 10.0         # publish cap (Hz); null = every odometry sample (~50 Hz)
pose_frame_id: odom           # header.frame_id in the published message

# --- Battery ---------------------------------------------------------------
# Charge percentage derived from pack voltage (tel/battery) via a Li-ion OCV
# curve. Published as {"data": pct, "voltage_v":.., "current_a":.., "cells":..}
# — the "data" field matches ros_ws's Float32 charge_percentage shape.
publish_battery: true
battery_topic: spot/status/charge_percentage  # MQTT topic the charge percentage is published on
battery_cells: 3              # series Li-ion cells (3S pack)

# --- Camera ----------------------------------------------------------------
camera: picamera              # picamera (Pi Cam Module 3) | oakd | realsense
no_camera: false              # set true to disable capture (e.g. when running the logger)
rate_limit: 3.0               # camera publish cap (Hz); null = uncapped
width: 1280                   # honored exactly by realsense; advisory for oakd
height: 720
fps: 15
crop_mode: stretch            # center | top | stretch
crop_top_fraction: 0.5       # only used when crop_mode == top
rotate: 180                   # 0/90/180/270 clockwise; 180 for this rover's inverted mount

# --- Action handling / arc steering ----------------------------------------
action_scale: 1.0             # multiplier on raw linear/angular (fallback path only)
use_waypoints: true           # arc-steer on waypoints instead of raw velocities
waypoint_index: 2             # initial target waypoint (0-indexed)
actuation_duration: 1.0       # seconds the arc is meant to be driven (velocity scale)
max_linear_velocity: 1.0      # m/s  — rover-scale cap (firmware also clamps)
max_angular_velocity: 4.0     # rad/s
turn_in_place_threshold_deg: 45.0  # pivot in place above this bearing (diff-drive)
min_angular_velocity: 0.0     # dead-band on |angular.z| (rad/s); 0 disables

# --- cmd_vel publishing cadence (also the firmware heartbeat) --------------
# Keep publish_rate well above 2 Hz or the rover stutter-stops on its 500 ms
# heartbeat timeout. 20 ticks @ 10 Hz = 2 s buffer / 2 s explicit stop.
publish_rate: 10.0
max_publishes: 20
max_zero_publishes: 20

# --- Pose-driven waypoint advance (pose = host wheel odometry) -------------
max_waypoint_advance: 5       # extra waypoints to advance to per trajectory; 0 = none
waypoint_tolerance: 0.3       # metres within which a waypoint counts as reached
recompute: true               # re-aim each buffer-phase command from latest pose
max_action_age: null          # safety: stop if no fresh action within N s; null = off

# --- Wheel odometry geometry (must match firmware Kconfig) -----------------
wheel_diameter_mm: 80.0
track_width_mm: 172.0
encoder_ppr: 1050
publish_display: false        # feed host odometry pose back to the rover's OLED

# --- Misc ------------------------------------------------------------------
log_level: INFO
